" x="52" y="852.4414">二级信息</text><!--MD5=[1c1448eca91db536988f0c31057e9c3f]
@startuml
小程序 -> 小程序: wx.login()获取code
小程序 -> 认证服务: 请求接口发送code
认证服务 -> 微信接口服务器: 请求登录凭证校验接口\nappid + appsecret + code
认证服务 <- 微信接口服务器: session_key + openid等
认证服务 -> 认证服务: 认证成功后基于openid\n生成一级token
认证服务 -> 缓存服务: session_key（key='session_key'+openid）
小程序 <- 认证服务: 一级token
小程序 -> 小程序: 一级token存入storage
小程序 -> 认证服务: 一级接口请求，请求头中携带token\n（一级接口即无需登录就可以访问的接口）
认证服务 -> 其他业务服务: 校验token成功且存在openid，则跳转到对应的业务服务
小程序 <- 其他业务服务: 一级信息
小程序 -> 认证服务: 授权手机号登录，请求头中携带一级token\n参数中携带encryptedData、iv
认证服务 -> 认证服务: 校验token成功且存在openid
认证服务 <- 缓存服务: session_key（key='session_key'+openid）
认证服务 -> 认证服务: 解密手机号\n（session_key、appid、encryptedData、iv）\n并基于手机号、userId、openid、生成二级token
认证服务 -> 缓存服务: 二级token，key='token'+userId
小程序 <- 认证服务: 二级token
小程序 <- 小程序: 二级token存入storage
小程序 -> 认证服务: 二级接口请求，请求头中携带二级token
认证服务 <- 缓存服务: 二级token，key='token'+userId
认证服务 -> 其他业务服务: 缓存中token存在，且校验成功，则跳转对应的业务服务
小程序 <- 其他业务服务: 二级信息
@enduml

